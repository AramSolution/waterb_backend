plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.6'
    id 'io.spring.dependency-management' version '1.1.6'
    id 'maven-publish'
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo1.maven.org/maven2/')
    }

    maven {
        url = uri('https://maven.egovframe.go.kr/maven/')
    }

    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

// Spring Boot 기본 로깅(Logback)과 Log4j2 SLF4J 바인딩 충돌 방지
configurations.all {
    exclude group: 'org.apache.logging.log4j', module: 'log4j-slf4j2-impl'
}

dependencies {
    implementation libs.org.springframework.boot.spring.boot.starter.web
    implementation libs.org.apache.tomcat.embed.tomcat.embed.core
    implementation libs.org.apache.tomcat.embed.tomcat.embed.el
    implementation libs.org.apache.tomcat.embed.tomcat.embed.jasper
    implementation libs.org.apache.tomcat.embed.tomcat.embed.websocket
    implementation libs.org.apache.tomcat.tomcat.annotations.api
    implementation libs.org.springframework.boot.spring.boot.devtools
    implementation libs.org.springdoc.springdoc.openapi.starter.webmvc.ui
    implementation libs.org.egovframe.rte.egovframe.rte.ptl.mvc
    implementation libs.org.egovframe.rte.egovframe.rte.psl.dataaccess
    implementation libs.org.egovframe.rte.egovframe.rte.fdl.idgnr
    implementation libs.org.egovframe.rte.egovframe.rte.fdl.property
    implementation libs.org.egovframe.rte.egovframe.rte.fdl.string
    implementation libs.org.egovframe.rte.egovframe.rte.fdl.crypto
    implementation libs.org.egovframe.rte.egovframe.rte.fdl.security
    implementation libs.org.apache.commons.commons.dbcp2
    implementation libs.commons.codec.commons.codec
    implementation libs.commons.validator.commons.validator
    implementation libs.org.apache.commons.commons.fileupload2.jakarta.servlet6
    implementation libs.cglib.cglib
    implementation libs.org.antlr.antlr4
    implementation libs.org.apache.commons.commons.compress
    implementation libs.org.apache.commons.commons.lang3
    implementation libs.org.hsqldb.hsqldb
    implementation libs.com.mysql.mysql.connector.j
    implementation libs.org.hibernate.validator.hibernate.validator
    implementation libs.com.googlecode.log4jdbc.log4jdbc
    implementation libs.org.apache.logging.log4j.log4j.core
    implementation libs.io.jsonwebtoken.jjwt
    implementation libs.com.ibm.icu.icu4j
    implementation libs.org.eclipse.yasson
    implementation libs.org.glassfish.jakarta.json
    testImplementation libs.org.springframework.boot.spring.boot.starter.test
    testImplementation libs.org.springframework.boot.spring.boot.starter.data.jpa
    testImplementation libs.org.apache.httpcomponents.client5.httpclient5
    testImplementation libs.com.querydsl.querydsl.jpa
    testImplementation libs.org.seleniumhq.selenium.selenium.java
    compileOnly libs.com.querydsl.querydsl.apt
    compileOnly libs.org.projectlombok.lombok
    annotationProcessor libs.org.projectlombok.lombok
    implementation 'org.springframework.boot:spring-boot-starter-security:3.5.6'
    implementation 'org.springframework.boot:spring-boot-starter-aop:3.5.6'
    implementation 'org.springframework.data:spring-data-commons'
    implementation 'com.github.f4b6a3:tsid-creator:5.2.6'
    implementation 'net.logstash.logback:logstash-logback-encoder:7.4'
    implementation 'org.bouncycastle:bcprov-jdk18on:1.78'
    implementation 'com.googlecode.json-simple:json-simple:1.1'
    implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-xml:2.15.2'

    // OAuth (ScribeJava)
    implementation 'com.github.scribejava:scribejava-apis:8.3.1'
    implementation files('src/main/resources/libs/commons-httpclient-3.1.jar')
    implementation files('src/main/resources/libs/libgpkiapi_jni_1.5.jar')
}

group = 'co.kr.uaram'
version = '1.0.0'
description = 'waterb_backend'
java.sourceCompatibility = JavaVersion.VERSION_21

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}

tasks.register('exportNeisCert', JavaExec) {
    group = 'other'
    description = 'Export open.neis.go.kr certificate to neis.cer for truststore import'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'arami.shared.neis.util.NeisCertExporter'
}