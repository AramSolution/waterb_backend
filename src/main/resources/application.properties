spring.profiles.active=dev
spring.config.use-legacy-processing=true
#-----------------------------------------------------------------------
#
#   globals.properties : \uC2DC\uC2A4\uD15C
#
#-----------------------------------------------------------------------
#   1.  key = value \uAD6C\uC870\uC785\uB2C8\uB2E4.
#   2.  key\uAC12\uC740 \uACF5\uBC31\uBB38\uC790\uB97C \uD3EC\uD568\uBD88\uAC00, value\uAC12\uC740 \uACF5\uBC31\uBB38\uC790\uB97C \uAC00\uB2A5
#   3.  key\uAC12\uC73C\uB85C \uD55C\uAE00\uC744 \uC0AC\uC6A9\uBD88\uAC00,   value\uAC12\uC740 \uD55C\uAE00\uC0AC\uC6A9\uC774 \uAC00\uB2A5
#   4.  \uC904\uC744 \uBC14\uAFC0 \uD544\uC694\uAC00 \uC788\uC73C\uBA74 '\'\uB97C \uB77C\uC778\uC758 \uB05D\uC5D0 \uCD94\uAC00(\uB9CC\uC57D  '\'\uBB38\uC790\uB97C \uC0AC\uC6A9\uD574\uC57C \uD558\uB294 \uACBD\uC6B0\uB294 '\\'\uB97C \uC0AC\uC6A9)
#   5.  Windows\uC5D0\uC11C\uC758 \uB514\uB809\uD1A0\uB9AC \uD45C\uC2DC : '\\' or '/'  ('\' \uC0AC\uC6A9\uD558\uBA74 \uC548\uB428)
#   6.  Unix\uC5D0\uC11C\uC758 \uB514\uB809\uD1A0\uB9AC \uD45C\uC2DC : '/'
#   7.  \uC8FC\uC11D\uBB38 \uCC98\uB9AC\uB294  #\uC0AC\uC6A9
#   8.  value\uAC12 \uB4A4\uC5D0 \uC2A4\uD398\uC774\uC2A4\uAC00 \uC874\uC7AC\uD558\uB294 \uACBD\uC6B0 \uC11C\uBE14\uB9BF\uC5D0\uC11C \uCC38\uC870\uD560\uB54C\uB294 \uC5D0\uB7EC\uBC1C\uC0DD\uD560 \uC218 \uC788\uC73C\uBBC0\uB85C trim()\uD558\uAC70\uB098 \uB9C8\uC9C0\uB9C9 \uACF5\uBC31\uC5C6\uC774 properties \uAC12\uC744 \uC124\uC815\uD560\uAC83
#-----------------------------------------------------------------------

# G4C \uC5F0\uACB0\uC6A9 IP (localhost)
Globals.LocalIp=127.0.0.1

# DB\uC11C\uBC84 \uD0C0\uC785(hsql,mysql,oracle,altibase,tibero) - datasource \uBC0F sqlMap \uD30C\uC77C \uC9C0\uC815\uC5D0 \uC0AC\uC6A9\uB428
Globals.DbType=mysql
Globals.debug=true
# DB \uC811\uADFC \uC815\uBCF4

# Page Config
Globals.pageUnit=10
Globals.pageSize=10

# File Config
Globals.posblAtchFileSize=5242880
Globals.fileStorePath=/home/aram/test
Globals.addedOptions=false

# mysql
Globals.mysql.DriverClassName=com.mysql.cj.jdbc.Driver
# DB \uC5F0\uACB0 \uC815\uBCF4\uB294 application-{profile}.properties\uC5D0\uC11C \uC124\uC815

# MainPage Setting
Globals.MainPage = /cmm/main/mainPage.do

# Domain \uC124\uC815\uC740 application-{profile}.properties\uC5D0\uC11C \uC124\uC815
# OAuth \uCF5C\uBC31 \uB9AC\uB2E4\uC774\uB809\uD2B8\uC6A9 \uD504\uB860\uD2B8\uC5D4\uB4DC \uB3C4\uBA54\uC778 (\uBBF8\uC124\uC815 \uC2DC http://localhost:3000)
Globals.frontendDomain=http://localhost:3000

# \uD30C\uC77C \uD655\uC7A5\uC790 \uD654\uC774\uD2B8\uB9AC\uC2A4\uD2B8(\uD5C8\uC6A9\uBAA9\uB85D) : \uD30C\uC77C \uD655\uC7A5\uC790\uB97C (.)\uACFC \uD568\uAED8 \uC5F0\uC774\uC5B4\uC11C \uC0AC\uC6A9\uD558\uBA70 (.)\uB85C \uC2DC\uC791\uD55C\uB2E4.
Globals.fileUpload.Extensions.Images = .gif.jpg.jpeg.png
Globals.fileUpload.Extensions = .gif.jpg.jpeg.png.xls.xlsx.hwp.pcrd.xlsm.pdf.pptx.hwpx.bmp.zip

# Access-Control-Allow-Origin\uC740 application-{profile}.properties\uC5D0\uC11C \uC124\uC815

#\uC554\uD638\uD654\uC11C\uBE44\uC2A4 \uC54C\uACE0\uB9AC\uC998 \uD0A4
#\uC8FC\uC758 : \uBC18\uB4DC\uC2DC \uAE30\uBCF8\uAC12 "egovframe"\uC744 \uB2E4\uB978\uAC83\uC73C\uB85C \uBCC0\uACBD\uD558\uC5EC \uC0AC\uC6A9\uD558\uC2DC\uAE30 \uBC14\uB78D\uB2C8\uB2E4.
Globals.crypto.algoritm = egovframe

#JWT secret key
#\uC8FC\uC758 : \uBC18\uB4DC\uC2DC \uAE30\uBCF8\uAC12\uC744 \uB2E4\uB978\uAC83\uC73C\uB85C \uBCC0\uACBD\uD558\uC5EC \uC0AC\uC6A9\uD558\uC2DC\uAE30 \uBC14\uB78D\uB2C8\uB2E4
