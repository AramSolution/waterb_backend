services:
  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: waterb_backend
    restart: unless-stopped
    ports:
      - "9443:8443"
    networks:
      - app_network
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC"
    volumes:
      - app_files:/home/aram
      - /home/aram/vol/ssl:/app/ssl
      - /home/aram/vol/files:/home/aram/test
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8443/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  app_files:
    driver: local

networks:
  app_network:
    driver: bridge
